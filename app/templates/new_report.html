{% extends "base.html" %}
{% block title %}新建报表{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h4 class="mb-4">新建财务报表</h4>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">报表类型</label>
                        <select name="report_type" class="form-select" id="rtype">
                            <option value="quarterly" selected>季报</option>
                            <option value="annual">年报</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">年度</label>
                        <input type="number" name="year" class="form-control" value="{{ year }}" required>
                    </div>
                    <div class="mb-3" id="qDiv">
                        <label class="form-label">季度</label>
                        <select name="quarter" class="form-select">
                            {% for q in [1,2,3,4] %}
                            <option value="{{ q }}" {% if q == quarter %}selected{% endif %}>第{{ q }}季度</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">纳税人识别号</label>
                        <input type="text" name="taxpayer_id" class="form-control" placeholder="统一社会信用代码">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">纳税人名称</label>
                        <input type="text" name="taxpayer_name" class="form-control" placeholder="企业全称">
                    </div>
                    <button type="submit" class="btn btn-primary">开始填写</button>
                    <a href="/" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('rtype').addEventListener('change', function(){
    document.getElementById('qDiv').style.display = this.value === 'annual' ? 'none' : '';
});
</script>
{% endblock %}
