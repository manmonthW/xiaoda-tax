{% extends "base.html" %}
{% block title %}新建季度 - xiaoda报税{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title mb-4">新建季度报税</h4>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">年度</label>
                        <input type="number" name="year" class="form-control" value="{{ default_year }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">季度</label>
                        <select name="quarter" class="form-select">
                            {% for q in [1,2,3,4] %}
                            <option value="{{ q }}" {% if q == default_quarter %}selected{% endif %}>第{{ q }}季度</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">创建</button>
                    <a href="{{ url_for('main.index') }}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
